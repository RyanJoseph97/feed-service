server.port=8083
server.servlet.context-path=/feed-service

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Docker internal hostnames match docker-compose service names
user.service.base-url=http://user-service:8080/user-service
event.service.base-url=http://event-service:8081/event-service

logging.level.root=INFO
logging.level.com.eventmaster=INFO
logging.file.name=logs/feed-service.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
