server.port=8083
server.servlet.context-path=/feed-service

# Jackson — serialize LocalDateTime as ISO-8601 strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT — must match user-service. Override with JWT_SECRET env var in production.
jwt.secret=${JWT_SECRET:eventmaster-shared-dev-secret-key-change-in-prod}
jwt.expiration=86400000

# Downstream service URLs (local dev)
user.service.base-url=http://localhost:8080/user-service
event.service.base-url=http://localhost:8081/event-service

# Logging
logging.level.root=INFO
logging.level.com.eventmaster=DEBUG
